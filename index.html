<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Navigasi Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Background Mewah dengan Gradient Mesh */
        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top left, #1a1a1a, #000000);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 50px;
            margin: 0;
            color: #fff;
        }

        .sidebar {
            width: 350px;
            perspective: 1000px;
        }

        /* Container Judul */
        .menu-header {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 12px;
            color: #d4af37; /* Gold */
            margin-bottom: 15px;
            padding-left: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
        }

        .menu-header::before {
            content: "";
            width: 20px;
            height: 2px;
            background: #d4af37;
            margin-right: 10px;
        }

        /* Gaya Tombol Utama (Glassmorphism) */
        .menu-item {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            padding: 18px 25px;
            margin-bottom: 12px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 500;
            color: #e0e0e0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left;
            position: relative;
            overflow: hidden;
            outline: none;
        }

        /* Efek Kilauan (Glow) saat Hover */
        .menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #d4af37;
            color: #fff;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            transform: translateX(5px);
        }

        /* Warna Aktif untuk Menu Bonus */
        .menu-item.active {
            background: linear-gradient(135deg, #d4af37 0%, #f9e27d 100%);
            color: #000;
            border: none;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        /* Gaya Sub-menu */
        .submenu {
            background: rgba(0, 0, 0, 0.3);
            margin: -5px 10px 20px 20px;
            border-radius: 0 0 15px 15px;
            border-left: 2px solid #d4af37;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out;
        }

        .submenu.show {
            max-height: 500px;
        }

        .submenu a {
            display: block;
            padding: 14px 25px;
            text-decoration: none;
            color: #bbb;
            font-size: 14px;
            transition: 0.3s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .submenu a:hover {
            background: rgba(212, 175, 55, 0.1);
            color: #f9e27d;
            padding-left: 35px;
        }

        /* Ikon & Animasi */
        .arrow {
            font-size: 14px;
            transition: transform 0.4s;
        }

        .active-arrow {
            transform: rotate(180deg);
            color: #d4af37;
        }

        .icon-box {
            margin-right: 15px;
            width: 20px;
            text-align: center;
        }

    </style>
</head>
<body>

<div class="sidebar">
    <div class="menu-header">Main Dashboard</div>
    
    <button class="menu-item" onclick="toggleMenu('laporanMenu', this)">
        <span><i class="fas fa-chart-pie icon-box"></i> Laporan Utama</span>
        <i class="fas fa-chevron-down arrow"></i>
    </button>
    <div id="laporanMenu" class="submenu">
        <a href="#"><i class="fas fa-user-edit"></i> Ganti Data Rekening</a>
        <a href="#"><i class="fas fa-user-lock"></i> Laporan Lock</a>
        <a href="#"><i class="fas fa-font"></i> Spasi Nama Rekening</a>
        <a href="#"><i class="fas fa-shield-halved"></i> Lock Dual User ID</a>
    </div>

    <button class="menu-item active" onclick="window.location.href='https://711-hub.github.io/opr/mahjongevent/'">
        <span><i class="fas fa-crown icon-box"></i> Bonus Mahjong Ways</span>
        <i class="fas fa-star"></i>
    </button>

    <button class="menu-item" onclick="window.location.href='https://dataaboy.github.io/CRM/'">
        <span><i class="fas fa-database icon-box"></i> Cek Data CRM</span>
    </button>
    
    <button class="menu-item">
        <span><i class="fas fa-cog icon-box"></i> Pengaturan Akun</span>
    </button>
</div>

<script>
    function toggleMenu(id, btn) {
        const menu = document.getElementById(id);
        const icon = btn.querySelector('.arrow');
        
        menu.classList.toggle('show');
        
        if (icon) {
            icon.classList.toggle('active-arrow');
        }

        // Efek klik pada button
        btn.style.transform = "scale(0.98)";
        setTimeout(() => {
            btn.style.transform = "translateX(5px)";
        }, 100);
    }
</script>

</body>
</html>
